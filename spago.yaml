package:
  name: browser-json-tree
  description: Typed Halogen renderer + click behaviour for collapsible JSON trees, with overridable string-leaf link resolution.
  publish:
    version: 0.2.0
    license: Apache-2.0
    location:
      githubOwner: lambdasistemi
      githubRepo: browser-json-tree
  dependencies:
    - prelude
    - effect
    - aff
    - halogen
    - argonaut-core
    - argonaut-codecs
    - arrays
    - either
    - exceptions
    - foreign-object
    - integers
    - numbers
    - strings
    - tuples
    - maybe
    - web-html
  bundle:
    # JS-facing bundle. Produced by `spago bundle` and shipped
    # as `browser-json-tree.js` on the GitHub Release so vanilla
    # JS apps can `import { mount, install } from "./browser-json-tree.js"`
    # without writing Halogen.
    module: JsonTree.JS
    outfile: dist/browser-json-tree.js
    platform: browser
    type: module

workspace:
  packageSet:
    registry: 72.1.0
  extraPackages: {}
