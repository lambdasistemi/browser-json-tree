name: Deploy docs

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "mkdocs.yml"
      - "docs/**"
      - "nix/project.nix"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/deploy-docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false
          path: checkout
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build docs site
        working-directory: checkout
        run: nix build --quiet .#docsSite -o result-docs
      - name: Stage site for Pages upload
        working-directory: checkout
        run: |
          rm -rf _publish
          mkdir -p _publish
          cp -R -L result-docs/* _publish/
          chmod -R u+w _publish
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: checkout/_publish

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: nixos
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
