name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-gate:
    name: Build Gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false
          path: checkout
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build all derivations
        working-directory: checkout
        run: >-
          nix build --quiet
          .#checks.x86_64-linux.library
          .#checks.x86_64-linux.example
          .#checks.x86_64-linux.lint
      - name: Release version contract
        working-directory: checkout
        run: scripts/release/check-version-consistency

  library:
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false
          path: checkout
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Library compile
        working-directory: checkout
        run: nix build --quiet .#checks.x86_64-linux.library

  example:
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false
          path: checkout
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Example bundle (end-to-end smoke)
        working-directory: checkout
        run: nix build --quiet .#checks.x86_64-linux.example

  lint:
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false
          path: checkout
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Lint (purs-tidy)
        working-directory: checkout
        run: nix run --quiet .#lint
